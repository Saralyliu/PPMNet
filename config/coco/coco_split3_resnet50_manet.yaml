Data:
  data_root: D:\ly\data\coco
  base_data_root: D:\ly\data\base_annotation\coco
  annotation_root: D:\ly\data\coco\annotations
  train_list: D:\ly\code\DRDC\lists\coco/train.txt
  val_list: D:\ly\code\DRDC\lists\coco/val.txt
  classes: 2


CLIP:
  clip_path: D:\ly\code\DRDC\initmodel/ViT-B-16.pt

Train:
  train_h: 473
  train_w: 473
  val_size: 473
  scale_min: 0.8  # minimum random scale
  scale_max: 1.25 # maximum random scale
  rotate_min: -10  # minimum random rotate
  rotate_max: 10  # maximum random rotate
  ignore_label: 255
  padding_label: 255
  # Dataset & Mode
  split: 3
  shot: 5
  data_set: 'coco'
  use_split_coco: True # True means FWB setting
  # Optimizer
  batch_size: 8 # batch size for training (bs8 for 1GPU)
  base_lr: 0.0002
  pre_weight: D:\ly\code\DRDC\BAM-main\PSPNet\coco\split3\resnet50\best.pth
  epochs: 30
  start_epoch: 0
  stop_interval: 20 # stop when the best result is not updated for "stop_interval" epochs
  index_split: 0 # index for determining the params group with 10x learning rate
  power: 0.9 # 0 means no decay
  momentum: 0.9
  weight_decay: 0.01
  warmup: False
  # Viz & Save & Resume
  print_freq: 10
  save_freq: 10
  resume: # path to latest checkpoint (default: none, such as epoch_10.pth)  
  # Validate
  evaluate: True
  SubEpoch_val: False # val at the half epoch
  fix_random_seed_val: True
  batch_size_val: 1
  resized_val: True
  ori_resize: True  # use original label for evaluation
  # Else
  workers: 8
  fix_bn: True
  manual_seed: 321
  seed_deterministic: False
  zoom_factor: 8  # zoom factor for final prediction during training, be in [1, 2, 4, 8]

Method:
  layers: 50
  vgg: False
  aux_weight1: 1.0
  aux_weight2: 1.0
  low_fea: 'layer2'  # low_fea for computing the Gram matrix
  kshot_trans_dim: 2 # K-shot dimensionality reduction
  merge: 'final'     # fusion scheme for GFSS ('base' Eq(S1) | 'final' Eq(18) )
  merge_tau: 0.9     # fusion threshold tau

Test_Finetune:
  weight: C:\Users\ly\Desktop\PI-CLIP\exp\coco\PI_CLIP\pro_merge\3train_epoch_22_0.5755.pth #C:\Users\ly\Desktop\PI-CLIP\exp\coco\PI_CLIP\ourcpdr\3train_epoch_22_0.5626.pth #C:\Users\ly\Desktop\PI-CLIP\exp\coco\PI_CLIP\baseline\3train_epoch_26_0.5575.pth # Path to the test model
  ann_type: 'mask' 

