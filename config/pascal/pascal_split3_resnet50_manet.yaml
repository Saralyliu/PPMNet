Data:
  data_root: D:\ly\data\pascal
  base_data_root: D:\ly\data\base_annotation/pascal/
  annotation_root: D:\ly\data\pascal\Annotations #../data/VOCdevkit2012/VOC2012/Annotations/
  train_list: D:\ly\code\DRDC\lists\pascal/voc_sbd_merge_noduplicate.txt
  val_list: D:\ly\code\DRDC\lists\pascal/val.txt
  classes: 2


CLIP:
  clip_path: D:\ly\code\DRDC\initmodel/ViT-B-16.pt

Train:
  # Aug
  train_h: 473
  train_w: 473
  val_size: 473
  scale_min: 0.9  # minimum random scale
  scale_max: 1.1 # maximum random scale
  rotate_min: -10  # minimum random rotate
  rotate_max: 10  # maximum random rotate
  ignore_label: 255
  padding_label: 255
  # Dataset & Mode
  split: 3
  shot: 5
  data_set: 'pascal'
  use_split_coco: False # True means FWB setting
  # Optimizer
  batch_size: 8 # batch size for training (bs8 for 1GPU)
  base_lr: 0.0002
  pre_weight: D:\ly\code\DRDC\BAM-main/PSPNet/pascal/split3/resnet50/best.pth
  epochs: 35
  start_epoch: 0
  stop_interval: 20 # stop when the best result is not updated for "stop_interval" epochs
  index_split: 0  # index for determining the params group with 10x learning rate
  power: 0.9 # 0 means no decay
  momentum: 0.9
  weight_decay: 0.01
  warmup: False
  # Viz & Save & Resume
  print_freq: 10
  save_freq: 10
  resume:
  # Validate
  evaluate: True
  SubEpoch_val: True # val at the half epoch
  fix_random_seed_val: True
  batch_size_val: 1
  resized_val: True 
  ori_resize: True  # use original label for evaluation
  # Else
  workers: 8
  fix_bn: True
  manual_seed: 321
  seed_deterministic: False
  #add
  zoom_factor: 8

Method:
  layers: 50
  vgg: False
  aux_weight1: 1.0
  aux_weight2: 1.0
  low_fea: 'layer2'  # low_fea for computing the Gram matrix
  kshot_trans_dim: 2 # K-shot dimensionality reduction
  merge: 'final'     # fusion scheme for GFSS ('base' Eq(S1) | 'final' Eq(18) )
  merge_tau: 0.9     # fusion threshold tau
Test_Finetune:
  weight: C:\Users\ly\Desktop\PI-CLIP\exp\pascal\PI_CLIP\promerge\adaptive\3train_epoch_20_0.7433.pth #C:\Users\ly\Desktop\PI-CLIP\exp\pascal\PI_CLIP\promerge\3train_epoch_11_0.7466.pth #C:\Users\ly\Desktop\PI-CLIP\exp\pascal\PI_CLIP\cp_drq\3train_epoch_9_0.7274.pth #C:\Users\ly\Desktop\PI-CLIP\exp\pascal\PI_CLIP\cpdr_adp\3train_epoch_20_0.7523.pth #C:\Users\ly\Desktop\PI-CLIP\exp\pascal\PI_CLIP\Iq,Iq\3train_epoch_9_0.7179.pth #C:\Users\ly\Desktop\PI-CLIP\exp\pascal\PI_CLIP\cpdr_sq\3train_epoch_20_0.7422.pth ##C:\Users\ly\Desktop\PI-CLIP\exp\pascal\PI_CLIP\baselineIsxYs_Iq\0.6\3train_epoch_2_0.7090.pth #C:\Users\ly\Desktop\PI-CLIP\exp\pascal\PI_CLIP\ourcp_dr\3train_epoch_19_0.7443.pth #C:\Users\ly\Desktop\PI-CLIP\exp\pascal\PI_CLIP\baseline_sssq\3bs_ssstrain_epoch_19_0.7359.pth #C:\Users\ly\Desktop\PI-CLIP\exp\pascal\PI_CLIP\split3\resnet50\snapshot\train_epoch_12_0.7410.pth # Path to the test model
